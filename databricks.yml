bundle:
  name: nutrition-planner

include:
  - resources/*.yml

# The Vite build output is gitignored (regenerated by scripts/build.sh) but MUST
# be uploaded with the app source — re-include it so the SPA is served at /.
sync:
  include:
    - src/app/static/**
  exclude:
    - .claude/**
    - frontend/**
    - tests/**
    - .venv/**

targets:
  dev:
    default: true
    mode: development
    workspace:
      host: https://emerging-emea-hackathons.cloud.databricks.com
      profile: hackathons
